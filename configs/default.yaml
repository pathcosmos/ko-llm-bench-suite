# ko-llm-bench-suite 기본 설정
# 이 파일의 값은 --config로 사용자 YAML에 의해 오버라이드 가능

project:
  # 프로젝트 이름 (HTML 리포트 제목에 표시)
  name: "Korean LLM Evaluation"
  # 평가 결과 JSON 출력 경로 (자동 생성됨)
  output_dir: "./results"
  # HTML/Markdown 리포트 출력 경로 (자동 생성됨)
  reports_dir: "./reports"

backend:
  # 추론 백엔드 (현재: "ollama", 향후: "vllm")
  type: ollama
  # Ollama API 서버 URL (원격: "http://remote-ip:11434")
  url: "http://localhost:11434"
  # true = 원격 서버 (로컬 GPU 리셋/Ollama 재시작 비활성화)
  remote: false

# 평가 대상 모델 목록 (비어있으면 config.py의 ALL_MODELS 사용)
# 예시:
#   - name: "qwen2.5:3b"
#     tags: [baseline]
models: []

tracks:
  # 실행할 트랙 번호: 1=KoBEST, 2=Ko-Bench, 3=Korean Deep,
  # 4=Code/Math, 5=Consistency, 6=Performance, 7=Pairwise Elo
  enabled: [1, 2, 3, 4, 5, 6, 7]
  # 실행 순서 (성능 측정을 먼저 하여 GPU 상태 확인)
  order: [6, 1, 3, 2, 4, 5, 7]

judge:
  # 이중 Judge 사용 여부 (false = primary만 사용, 더 빠름)
  dual_enabled: true
  primary:
    # Primary Judge 모델 (다국어 범용, ~5-6GB VRAM)
    # Track 2, 3, 7에서 사용. 반드시 Ollama에 설치 필요
    model: "qwen2.5:7b-instruct"
    # 점수 가중치 [0~1] (primary + secondary = 1.0)
    weight: 0.6
  secondary:
    # Secondary Judge 모델 (한국어 특화, ~6-7GB VRAM)
    model: "exaone3.5:7.8b"
    weight: 0.4
  # Judge 호출 타임아웃 (초)
  timeout: 120

sampling:
  # 생성 모드 (대화, 작문 등)
  default:
    temperature: 0.7       # [0~2] 높을수록 다양한 출력 (0=결정론적)
    top_p: 0.9             # [0~1] nucleus sampling
    repeat_penalty: 1.2    # [1~2] 반복 억제 (1.0=무효)
    num_predict: 512       # 최대 생성 토큰 수
    num_ctx: 4096          # 컨텍스트 윈도우 크기
  # 벤치마크 모드 (정확도 측정용 greedy decoding)
  benchmark:
    temperature: 0.0
    top_p: 1.0
    repeat_penalty: 1.0
    num_predict: 256
    num_ctx: 4096

retry:
  # API 실패 시 최대 재시도 횟수
  max_retries: 3
  # 지수 백오프 기본값 (초): 5, 10, 20...
  backoff_base: 5
  # 모델 전환 시 VRAM 정리 대기 (초)
  cooldown_between_models: 10
  # 테스트 간 대기 (초, 과부하 방지)
  cooldown_between_tests: 1
