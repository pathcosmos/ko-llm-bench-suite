project:
  name: "Korean LLM Evaluation"
  output_dir: "./results"
  reports_dir: "./reports"

backend:
  type: ollama
  url: "http://localhost:11434"
  remote: false

models: []

tracks:
  enabled: [1, 2, 3, 4, 5, 6, 7]
  order: [6, 1, 3, 2, 4, 5, 7]

judge:
  dual_enabled: true
  primary:
    model: "qwen2.5:7b-instruct"
    weight: 0.6
  secondary:
    model: "exaone3.5:7.8b"
    weight: 0.4
  timeout: 120

sampling:
  default:
    temperature: 0.7
    top_p: 0.9
    repeat_penalty: 1.2
    num_predict: 512
    num_ctx: 4096
  benchmark:
    temperature: 0.0
    top_p: 1.0
    repeat_penalty: 1.0
    num_predict: 256
    num_ctx: 4096

retry:
  max_retries: 3
  backoff_base: 5
  cooldown_between_models: 10
  cooldown_between_tests: 1
